<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire Exemple</title>
    <link rel="stylesheet" href="/Assets/Css/inscription.css">
</head>
<body>

<div class="form-container">
    <h2>Formulaire</h2>

    <form action="/Assets/js/form.php" method="post">
        <label for="nom">Nom</label>
        <input type="text" id="nom" name="nom" placeholder="Votre nom" required>

          <label for="Prenom">Prenom</label>
        <input type="text" id="Prenom" name="Prenom" placeholder="Votre Prenom" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Votre email" required>

        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required>


        <div class="radio-group">
            <label>Moyen de payement :</label>
            <label><input type="radio" name="genre" value="AirtelMoney"> AirtelMoney</label>
            <label><input type="radio" name="genre" value="MoovMoney">MoovMoney</label>
             <label><input type="radio" name="genre" value="Mobicash">Mobicash</label>
               <label><input type="radio" name="genre" value="Carte Bancaire">Carte Bancaire</label>
                 <label><input type="radio" name="genre" value="Paiement à la Livraison">Paiement à la livraison</label>
        </div>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" placeholder="Votre message..."></textarea>

        <button type="submit" name="valider">Envoyer</button>
    </form>
</div>

</body>
</html>
